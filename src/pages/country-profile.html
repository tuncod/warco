<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@4.0.0/dist/tailwind.min.css" rel="stylesheet">
    <title>Tunisia - Country Profile</title>
</head>
<body class="bg-white">
    <div class="bg-cover h-64" style="background-image: url('path_to_header_image.jpg');">
        <div class="flex items-center justify-center h-full text-white">
            <h1 class="text-5xl font-bold">Profile of Tunisia</h1>
        </div>
    </div>
    <div class="flex justify-center mt-6">
        <img src="path_to_flag_image.jpg" alt="Tunisia Flag" class="w-32 h-32 rounded-full border-4 border-white shadow-lg">
    </div>
    <div class="mx-auto max-w-4xl mt-6 p-6 shadow-md rounded-lg bg-gray-50">
        <h2 class="text-2xl font-semibold">Country Statistics</h2>
        <div class="grid grid-cols-3 gap-4 mt-4">
            <div class="p-4 bg-white rounded-lg shadow">
                <h3 class="text-xl font-bold">Population</h3>
                <p>11 million</p>
            </div>
            <div class="p-4 bg-white rounded-lg shadow">
                <h3 class="text-xl font-bold">Area</h3>
                <p>163,610 km²</p>
            </div>
            <div class="p-4 bg-white rounded-lg shadow">
                <h3 class="text-xl font-bold">Capital</h3>
                <p>Tunis</p>
            </div>
        </div>
        <h2 class="text-2xl font-semibold mt-6">Detailed Information</h2>
        <div class="mt-4">
            <div class="p-4 bg-white rounded-lg shadow mb-4">
                <h3 class="text-xl font-bold">Official Language</h3>
                <p>Arabic</p>
            </div>
            <div class="p-4 bg-white rounded-lg shadow mb-4">
                <h3 class="text-xl font-bold">Currency</h3>
                <p>Tunisian Dinar (TND)</p>
            </div>
            <div class="p-4 bg-white rounded-lg shadow">
                <h3 class="text-xl font-bold">Time Zone</h3>
                <p>CET (UTC+1)</p>
            </div>
        </div>
    </div>
</body>
</html>
